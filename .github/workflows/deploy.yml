name: Deploy Dashboard

on:
  push:
    branches:
      - main
    paths-ignore:
      - data/final.json
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    outputs:
      page_url: ${{ steps.deployment.outputs.page_url }}
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Regenerate final dashboard payload
        run: python scripts/update_dashboard.py

      - name: Set up Pages
        uses: actions/configure-pages@v5

      - name: Build Pages artifact
        run: |
          mkdir -p dist
          mkdir -p dist/app
          cp app/index.html dist/app/index.html
          cp app/app.js dist/app/app.js
          cp app/styles.css dist/app/styles.css
          mkdir -p dist/data
          cp data/manual.json dist/data/manual.json
          cp data/auto.json dist/data/auto.json
          cp data/final.json dist/data/final.json
          cat <<'EOF' > dist/index.html
          <!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="UTF-8">
            <meta http-equiv="refresh" content="0; url=./app/">
            <title>Finance Dashboard</title>
          </head>
          <body>
            <p>Redirecting to <a href="./app/">Finance Dashboard</a>...</p>
          </body>
          </html>
          EOF
          touch dist/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  smoke-test:
    runs-on: ubuntu-latest
    needs: deploy
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Smoke test live Pages site
        run: python scripts/smoke_test.py "${{ needs.deploy.outputs.page_url }}"
